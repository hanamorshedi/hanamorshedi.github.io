<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="stylesheet" href="style.css" />
      <title>Small Wonders</title>
   </head>
   <body>
      <div class="container">
         <header>
            <h1>
               <a href="index.html">
                  <img src="logo.svg" alt="Small Wonders." />
               </a>
            </h1>
            <nav>
               <ul>
                  <li><a href="index.html">Moths</a></li>
                  <li><a href="index.html">Beetles</a></li>
                  <li><a href="index.html">Spiders</a></li>
                  <li><a href="index.html">Caterpillars</a></li>
                  <li><a href="photogallery.html">Gallery</a></li>
                  <li><a href="newsletter.html">Newsletter</a></li>
               </ul>
            </nav>
         </header>
         <main class="newsletter">
            <section class="signup">
               <h2>Subscribe to our Newsletter!</h2>
               <p>
                  Never miss out on a tiny update from Small Wonders again.
               </p>
               <form>
                  <label for="name">Your Name</label>
                  <input type="text" id="name" name="name" required />
                  <label for="email">Your Email</label>
                  <input type="email" id="email" name="email" required />
                  <fieldset>
                     <legend>Newsletter options</legend>
                     <label>
                        <input type="checkbox" name="newsletter" value="field-notes" />
                        Field Notes
                     </label>
                     <label>
                        <input type="checkbox" name="newsletter" value="bug-portraits" />
                        Bug Portraits
                     </label>
                     <label>
                        <input type="checkbox" name="newsletter" value="garden-guides" />
                        Garden Guides
                     </label>
                  </fieldset>
                  <button type="submit">Subscribe</button>
               </form>
            </section>
            <figure class="signup-img">
               <img src="gallery/pink-katydids.jpeg" alt="Pink katydid on a leaf." />
            </figure>
         </main>
         <footer>
            <p>
               Small Wonders. All rights reserved.
            </p>
         </footer>
      </div>
   </body>
</html>
